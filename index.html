<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practical Aspects of Translation and Localization</title>
    
    <style>
        /* Базові стилі для сторінки та картки */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 20px;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 12px;
        }

        .description {
            font-size: 12px;
            color: #666;
            margin-bottom: 24px;
        }

        /* Стилі для контейнера та самих кнопок */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn {
            display: block;
            text-align: center;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            transition: background-color 0.2s ease;
        }

        .btn-green {
            background-color: #3ba755;
            color: white;
        }

        .btn-green:hover {
            background-color: #2e8b44;
        }

        .btn-blue {
            background-color: #2980b9;
            color: white;
        }

        .btn-blue:hover {
            background-color: #216a9c;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="page-title">Завантаження...</h1>
        <a href="#" class="subtitle" id="course-structure">Course Structure</a>
        <p class="description" id="page-desc">Vocabularies, references and glossaries for students.</p>

        <div class="button-container">
            <a href="#" id="enroll-btn" class="btn btn-green">Enroll to the course</a>
            <button onclick="toggleLanguage()" id="change-lang-btn" class="btn btn-blue">Змінити мову / Change Language</button>
        </div>
    </div>

    <script>
        // Об'єкт із перекладами (якщо у вас був окремий en.json, цей вбудований підстрахує його)
        const translations = {
            'uk': {
                'title': 'Практичні аспекти перекладу та локалізації',
                'structure': 'Структура курсу',
                'desc': 'Словники, корисні посилання та глосарії для студентів.',
                'enroll': 'Записатися на курс',
                'change': 'Змінити мову / Change Language'
            },
            'en': {
                'title': 'Practical Aspects of Translation and Localization',
                'structure': 'Course Structure',
                'desc': 'Vocabularies, references and glossaries for students.',
                'enroll': 'Enroll to the course',
                'change': 'Змінити мову / Change Language'
            }
        };

        let currentLang = 'uk';

        function updateContent(lang) {
            const data = translations[lang];
            if (data) {
                document.getElementById('page-title').textContent = data.title;
                document.getElementById('course-structure').textContent = data.structure;
                document.getElementById('page-desc').textContent = data.desc;
                document.getElementById('enroll-btn').textContent = data.enroll;
                document.getElementById('change-lang-btn').textContent = data.change;
            }
        }

        function toggleLanguage() {
            currentLang = (currentLang === 'uk') ? 'en' : 'uk';
            updateContent(currentLang);
        }

        // Автоматичний запуск української версії сайту при завантаженні
        updateContent(currentLang);
    </script>

</body>
</html>
